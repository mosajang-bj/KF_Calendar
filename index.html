/* ════════════════════════════════════════
   TOKENS (GDS)
════════════════════════════════════════ */
:root {
  --bg:        #FFFFFF;
  --bg2:       #FFFFFF;
  --bg3:       #F6F6F6;
  --bg4:       #FFFFFF;
  --border:    rgba(25,25,25,0.08);
  --border2:   rgba(25,25,25,0.14);
  --txt1:      #191919;
  --txt2:      #8C8C8C;
  --txt3:      #CCCCCC;
  --accent:    #D80C18;
  --accent-l:  #AD0812;
  --r:         12px;
  --r-sm:      8px;
  --r-xs:      8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#E8E8E8;
  display:flex;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.app{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-feature-settings:'case' 1,'cpsp' 1,'ss03' 1;
  letter-spacing:0;
  color:var(--txt1);
  display:flex;flex-direction:column;
  width:100%;max-width:480px;
  min-height:100%;
  background:#F6F6F6;
  position:relative;
  overflow-x:hidden;
}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
.hdr{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:56px;
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
}
.logo{
  display:flex;align-items:center;
}
.hdr-r{display:flex;align-items:center;gap:12px}

/* ════════════════════════════════════════
   VIEW TOGGLE (week / month)
════════════════════════════════════════ */
.view-bar{
  position:sticky;top:56px;z-index:39;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:52px;
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
}
.view-title{font-size:17px;font-weight:700;letter-spacing:0;color:var(--txt1)}
.view-r{display:flex;align-items:center;gap:6px}
.toggle-wrap{
  display:flex;gap:2px;
  background:#F2F2F2;
  padding:3px;border-radius:9999px;
}
.toggle-btn{
  padding:4px 14px;border-radius:9999px;font-size:12px;font-weight:600;
  border:none;background:transparent;color:var(--txt2);cursor:pointer;
  transition:all .2s;letter-spacing:0;
}
.toggle-btn.on{background:#FFFFFF;color:var(--txt1);box-shadow:0 1px 6px rgba(0,0,0,0.1)}
.nav-btn{
  width:30px;height:30px;border-radius:50%;
  border:none;
  background:transparent;
  color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.nav-btn:hover{background:#F2F2F2;color:var(--txt1)}
.today-btn{
  padding:5px 12px;border-radius:9999px;font-size:12px;font-weight:600;
  border:1px solid var(--border);
  background:#FFFFFF;
  color:var(--txt2);cursor:pointer;transition:all .18s;letter-spacing:0;
}
.today-btn:hover{background:#F2F2F2;color:var(--txt1)}

/* ════════════════════════════════════════
   CALENDAR AREA
════════════════════════════════════════ */
.cal-area{
  flex-shrink:0;
  background:#F6F6F6;
  overflow:hidden;
  box-shadow:0 2px 0 rgba(0,0,0,0.04);
}

/* ── DOW HEADER ── */
.dow-row{
  display:grid;grid-template-columns:repeat(7,1fr);
  background:#FFFFFF;padding:0 4px;
}
.dow-cell{
  text-align:center;padding:8px 2px 6px;
  font-size:10px;font-weight:700;letter-spacing:0;color:var(--txt3);
}
.dow-cell:first-child{color:#E57373}
.dow-cell:last-child{color:#5C9EE8}

/* ── WEEK VIEW ── */
.week-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:4px;padding:4px;background:#F6F6F6;
}
.wday{
  display:flex;flex-direction:column;align-items:center;
  padding:8px 2px 8px;cursor:pointer;
  border-radius:10px;background:#FFFFFF;
  transition:background .15s;position:relative;
  -webkit-tap-highlight-color:transparent;
}
.wday:hover{background:#F0F0F0}
.wday.on{background:#F4F4F4;box-shadow:0 0 0 1.5px rgba(25,25,25,0.15)}
.wday.future{opacity:.4}

.wday-num{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;color:var(--txt1);letter-spacing:0;
}
.wday.today .wday-num{
  background:#191919;color:#fff;font-weight:700;
  box-shadow:0 3px 10px rgba(0,0,0,0.18);
}
.wday.sun .wday-num{color:#E57373}
.wday.sat .wday-num{color:#5C9EE8}
.wday.today.sun .wday-num,.wday.today.sat .wday-num{color:#fff}
.wday.on:not(.today) .wday-num{background:rgba(25,25,25,0.1);color:var(--txt1)}

.dots-col{display:flex;flex-direction:row;flex-wrap:wrap;gap:2px;margin-top:4px;align-items:center;justify-content:center;max-width:36px}
.evt-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* ── MONTH VIEW ── */
.month-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  grid-auto-rows:82px;gap:3px;
  background:#F6F6F6;padding:3px 4px 8px;
}
.mday{
  background:#FFFFFF;border-radius:10px;
  padding:7px 6px 5px;
  cursor:pointer;transition:all .15s;
  height:82px;min-height:82px;max-height:82px;
  overflow:hidden;position:relative;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
.mday:hover{background:#F4F4F4}
.mday.on{background:#F4F4F4;box-shadow:0 0 0 1.5px rgba(25,25,25,0.15)}
.mday.other{opacity:.3}
.mday.future{opacity:.4}
.mday-num{
  font-size:12px;font-weight:600;letter-spacing:0;
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:3px;color:var(--txt1);
}
.mday.today .mday-num{background:#191919;color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.18)}
.mday.sun .mday-num{color:#E57373}
.mday.sat .mday-num{color:#5C9EE8}
.mday.today.sun .mday-num,.mday.today.sat .mday-num{color:#fff}
.mday-dots{display:flex;flex-wrap:wrap;gap:2px;padding:0 1px}
.mdot{width:4px;height:4px;border-radius:50%}
.mday-evts{display:flex;flex-direction:column;gap:2px;margin-top:2px;overflow:hidden}
.mevt-pill{
  font-size:9px;font-weight:700;
  padding:2px 5px;border-radius:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.4;
}

/* ════════════════════════════════════════
   BOTTOM (scrollable)
════════════════════════════════════════ */
.bottom{
  flex:1;min-height:0;
  background:#FFFFFF;
  scrollbar-width:none;
}
.bottom::-webkit-scrollbar{display:none}

/* chip-only sticky strip */
.chip-sticky{
  position:sticky;top:108px;z-index:20;
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
}

/* selected date header */
.sel-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
}
.sel-date{font-size:16px;font-weight:700;color:var(--txt1);letter-spacing:0}
.sel-sub{font-size:12px;color:var(--txt2);margin-top:3px;letter-spacing:0;display:flex;align-items:center;gap:6px}
.evt-badge{
  font-size:12px;font-weight:700;
  min-width:28px;height:28px;padding:0 10px;
  border-radius:9999px;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  letter-spacing:0;
}

/* goods grid */
.goods-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px 12px;
  padding:0 20px 32px;
  background:#FFFFFF;
}

/* GDS Product Card */
.gcard{
  background:transparent;
  cursor:pointer;
  transition:opacity .2s;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
.gcard:hover{opacity:.8}
.gcard:active .gcard-img{transform:scale(.97)}

.gcard-img{
  aspect-ratio:1;
  border-radius:8px;
  overflow:hidden;
  position:relative;
  background:#F6F6F6;
  transition:transform .2s ease;
}
.gcard-img-bg{display:none}
.gcard-img-fallback{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;opacity:.3;
}
.gcard-img img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
}
.gcard-img img.err{display:none}

.gcard-body{padding:8px 0 0;text-align:left}
.gcard-name{
  font-size:13px;font-weight:400;color:var(--txt1);letter-spacing:0;
  line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:2px;
}
.gcard-price{
  font-size:14px;font-weight:700;color:var(--txt1);letter-spacing:0;
}

.goods-empty{
  padding:24px 20px;font-size:13px;color:var(--txt2);text-align:center;letter-spacing:0;
}

/* goods intro section */
.goods-intro{
  padding:20px 20px 16px;
}
.goods-intro-eyebrow{display:none}
.goods-intro-title{
  font-size:18px;font-weight:600;color:var(--txt1);
  line-height:1.3;letter-spacing:0;margin-bottom:10px;
  text-align:left;
}
.goods-intro-title em{
  font-style:normal;color:var(--accent);
}
.goods-intro-footer{
  display:flex;align-items:center;justify-content:space-between;
}
.goods-intro-sub{font-size:12px;color:var(--txt2);letter-spacing:0}
.goods-intro-link{
  font-size:12px;font-weight:600;color:var(--txt2);
  text-decoration:none;letter-spacing:0;
  display:flex;align-items:center;gap:3px;
}
.goods-intro-link:hover{color:var(--accent)}

/* divider */
.divider{display:none}

/* toast */
.toast{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(0);
  background:#191919;color:#FFFFFF;
  font-size:13px;font-weight:600;letter-spacing:0;
  padding:10px 20px;border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
  white-space:nowrap;z-index:9999;
  animation:toastIn .22s ease;pointer-events:none;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* feedback btn */
.fb-btn{
  position:fixed;bottom:20px;right:16px;z-index:8000;
  background:#FFFFFF;border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;
  font-size:12px;font-weight:600;color:var(--txt2);letter-spacing:0;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  display:flex;align-items:center;gap:6px;
  transition:all .18s;
}
.fb-btn:hover{color:var(--accent);border-color:rgba(216,12,24,0.2)}
</style>
</head>

// ─────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────
function dKey(d){ return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}` }
function p2(n){ return String(n).padStart(2,'0') }
function getWeekStart(d){
  const c=new Date(d);c.setDate(c.getDate()-c.getDay());c.setHours(0,0,0,0);return c;
}
function addDays(d,n){ const c=new Date(d);c.setDate(c.getDate()+n);return c }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate() }
function isFuture(ds){ return ds > dKey(TODAY); }

function eventsOnDate(ds){
  return EVENTS.filter(e=>e.date===ds);
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

}

function navNext(){ if(view==='week'){weekStart=addDays(weekStart,7)}else{monthPivot=new Date(monthPivot.getFullYear(),monthPivot.getMonth()+1,1)} buildCal() }

}

function updateTitle(){
  const t=document.getElementById('viewTitle');
  if(view==='week'){
    const ws=weekStart, we=addDays(weekStart,6);
    if(ws.getMonth()===we.getMonth()){
      t.textContent=`${MONTH_NAMES[ws.getMonth()]} ${ws.getDate()}–${we.getDate()}, ${ws.getFullYear()}`;
    } else {
      t.textContent=`${MONTH_NAMES[ws.getMonth()].slice(0,3)} ${ws.getDate()} – ${MONTH_NAMES[we.getMonth()].slice(0,3)} ${we.getDate()}, ${ws.getFullYear()}`;
    }
  } else {
    t.textContent=`${MONTH_NAMES[monthPivot.getMonth()]} ${monthPivot.getFullYear()}`;
  }
}

// ── WEEK VIEW ──
function buildWeek(area){
  const dowRow=document.createElement('div');
  dowRow.className='dow-row';
  for(let i=0;i<7;i++){
    const cell=document.createElement('div');
    cell.className='dow-cell';
    cell.textContent=DOW_SHORT[i];
    dowRow.appendChild(cell);
  }
  area.appendChild(dowRow);

  const grid=document.createElement('div');
  grid.className='week-grid';

  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i);
    const ds=dKey(d);
    const isToday=sameDay(d,TODAY);
    const isSel=ds===selectedDate;
    const future=isFuture(ds);

    const cell=document.createElement('div');
    const classes=['wday',isToday?'today':'',isSel?'on':'',i===0?'sun':'',i===6?'sat':'',future&&!isToday?'future':''].filter(Boolean).join(' ');
    cell.className=classes;

    const num=document.createElement('div');
    num.className='wday-num';
    num.textContent=d.getDate();
    cell.appendChild(num);

    const lineup = LINEUP_BY_DATE[ds];
    if(lineup){
      const dc=document.createElement('div');
      dc.className='dots-col';
      const show = SHOW_LABELS[lineup.showName];
      const showColor = show ? show.color : '#9B6FD8';
      const dot=document.createElement('div');
      dot.className='evt-dot';
      dot.style.background=showColor;
      dot.title=(show?show.short:lineup.showName)+' 공방';
      dc.appendChild(dot);
      const wRaw = parseRawTitleStatic(lineup.rawTitle);
      const wCount = wRaw.length > 0 ? wRaw.length : lineup.groups.length;
      if(wCount > 0){
        const cnt=document.createElement('div');
        cnt.style.cssText=`font-size:7px;color:${showColor};font-weight:800;line-height:1;margin-top:1px`;
        cnt.textContent=`${wCount}팀`;
        dc.appendChild(cnt);
      }
      cell.appendChild(dc);
    }

    cell.onclick=()=>{ selectDate(ds); scrollToBottom(); };
    grid.appendChild(cell);
  }
  area.appendChild(grid);
}

// ── MONTH VIEW ──
function buildMonth(area){
  const y=monthPivot.getFullYear(), m=monthPivot.getMonth();
  const firstDow=new Date(y,m,1).getDay();
  const daysInM=new Date(y,m+1,0).getDate();
  const daysInPrev=new Date(y,m,0).getDate();

  const dowRow=document.createElement('div');
  dowRow.className='dow-row';
  DOW_SHORT.forEach(d=>{
    const c=document.createElement('div');
    c.className='dow-cell';
    c.textContent=d;
    dowRow.appendChild(c);
  });
  area.appendChild(dowRow);

  const grid=document.createElement('div');
  grid.className='month-grid';

  let cells=[];
  for(let i=firstDow-1;i>=0;i--)
    cells.push({day:daysInPrev-i,mo:m-1,yr:m===0?y-1:y,other:true});
  for(let d=1;d<=daysInM;d++)
    cells.push({day:d,mo:m,yr:y,other:false});
  while(cells.length<35) cells.push({day:cells.length-firstDow-daysInM+1,mo:m+1,yr:m===11?y+1:y,other:true});

  cells.forEach((c,idx)=>{
    const d=new Date(c.yr,c.mo,c.day);
    const ds=dKey(d);
    const isToday=sameDay(d,TODAY);
    const isSel=ds===selectedDate;
    const future=isFuture(ds);
    const dow=idx%7;

    const cell=document.createElement('div');
    cell.className=['mday',c.other?'other':'',isToday?'today':'',isSel?'on':'',dow===0?'sun':'',dow===6?'sat':'',future&&!isToday&&!c.other?'future':''].filter(Boolean).join(' ');

    const num=document.createElement('div');
    num.className='mday-num';
    num.textContent=c.day;
    cell.appendChild(num);

    const mLineup = LINEUP_BY_DATE[ds];
    if(mLineup){
      const show = SHOW_LABELS[mLineup.showName];
      const showColor = show ? show.color : '#9B6FD8';
      const dotsEl=document.createElement('div');
      dotsEl.className='mday-dots';
      const dot=document.createElement('div');
      dot.className='mdot';
      dot.style.background=showColor;
      dotsEl.appendChild(dot);
      cell.appendChild(dotsEl);

      const pillsEl=document.createElement('div');
      pillsEl.className='mday-evts';
      const pill=document.createElement('div');
      pill.className='mevt-pill';
      pill.style.background=showColor+'33';
      pill.style.color=showColor;
      const mRaw = parseRawTitleStatic(mLineup.rawTitle);
      const mCount = mRaw.length > 0 ? mRaw.length : mLineup.groups.length;
      pill.textContent=(show?show.short:mLineup.showName)+(mCount?` · ${mCount}팀`:'');
      pillsEl.appendChild(pill);
      cell.appendChild(pillsEl);
    }

    cell.onclick=()=>{ selectDate(ds); scrollToBottom(); };
    grid.appendChild(cell);
  });
  area.appendChild(grid);
}

}

// 코너명/설명 텍스트 블랙리스트 — 칩에서 제거
const SEGMENT_BLACKLIST = new Set([
  '영 크리에이터 크루', '온 세상을 다정함으로 물들일 큐피드',
  '뮤직뱅크 1위 앵콜직캠', '앵콜직캠', '직캠', '공연', '특집',
]);

// 세그먼트에서 실제 그룹명만 추출: "CRAVITY COMEBACK" → "CRAVITY"
// ARTIST_TO_GROUP_FRONT 키 중 longest-prefix match 사용
function cleanArtistSegment(seg) {
  if (SEGMENT_BLACKLIST.has(seg)) return '';
  const keys = Object.keys(ARTIST_TO_GROUP_FRONT).sort((a,b) => b.length - a.length);
  for (const k of keys) {
    if (seg === k || seg.startsWith(k + ' ') || seg.startsWith(k + '\u00a0')) {
      return k;
    }
  }
  return seg; // 매핑 없는 경우 원본 (개인 아티스트 등)
}

// parseRawTitle 전역 버전 (renderBottom 스코프 밖에서도 사용)
function parseRawTitleStatic(raw) {
  if (!raw) return [];
  // HTML entity decode: &#39; → '
  const decoded = raw.replace(/&#39;/g, "'").replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
  const dashIdx = decoded.indexOf(' - ');
  let segments;
  if (dashIdx !== -1) {
    segments = decoded.slice(dashIdx + 3)
      .replace(/\s+등\s*$/, '')
      .split(',')
      .map(s => s.replace(/\s*\([^)]*\)/g, '').trim());
  } else {
    segments = decoded.split(/\s*[·.]\s*/).map(s => s.trim()).filter(s => s);
  }
  // 중복 제거하면서 순서 유지
  const seen = new Set();
  const result = [];
  for (const seg of segments) {
    const cleaned = cleanArtistSegment(seg);
    if (!cleaned || seen.has(cleaned)) continue;
    seen.add(cleaned);
    result.push(cleaned);
  }
  return result;
}

      </div>

    `;
  } else {
    hdr.innerHTML=`
      <div>
        <div class="sel-date">${dayNames[dateObj.getDay()]}, ${MONTH_NAMES[mo-1]} ${d}</div>
        <div class="sel-sub">공방 일정 없음</div>
      </div>
    `;
  }
  // date header는 일반 flow
  bot.appendChild(hdr);

  // ── Group chips (GDS Pill Tab) — sticky ──
  if(lineup && chipCount > 0){
    const stickyWrap = document.createElement('div');
    stickyWrap.className = 'chip-sticky';

    const strip = document.createElement('div');
    strip.style.cssText = 'padding:8px 16px 10px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;';

    allChip.textContent = '전체';
    allChip.onclick = () => {
      selectedArtistName = null;
      allGroupsSelected = true;
      renderBottom();
    };
    strip.appendChild(allChip);

    // ── 개별 그룹 칩 ──
    const artists = rawArtists.length > 0 ? rawArtists : lineup.groups;
    artists.forEach(artistName => {
      const chip = document.createElement('button');
      const isActive = !allGroupsSelected && selectedArtistName === artistName;
      chip.style.cssText = pillBase + `background:${isActive ? '#191919' : '#F6F6F6'};color:${isActive ? '#FFFFFF' : '#8C8C8C'};`;

      chip.onclick = () => {
        const toggling = !allGroupsSelected && selectedArtistName === artistName;
        selectedArtistName = toggling ? null : artistName;
        allGroupsSelected = false;
        renderBottom();
        if(selectedArtistName) fetchAndShowLiveGoods(selectedArtistName);

      strip.appendChild(chip);

    stickyWrap.appendChild(strip);
    bot.appendChild(stickyWrap);

  // ── Divider ──
  const div=document.createElement('div');

// ─────────────────────────────────────────
//  LIVE GOODS: 번장 실시간 검색
// ─────────────────────────────────────────
// 전체 탭: 여러 그룹을 각각 검색해서 합치기
async function fetchAllGroupGoods(artists) {
  const area = document.getElementById('live-goods-area');
  if(!area) return;

  try {
    const results = await Promise.all(
      artists.map(a =>
        fetch(`/api/goods?artist=${encodeURIComponent(a)}&n=40`)
          .then(r => r.ok ? r.json() : { items: [] })
          .then(d => d.items || [])
          .catch(() => [])
      )
    );

    const freshArea = document.getElementById('live-goods-area');
    if(!freshArea || !allGroupsSelected) return;

    // 중복 제거 후 최신순 정렬
    const seen = new Set();
    const items = [];
    for(const group of results){
      for(const item of group){
        if(seen.has(item.id)) continue;
        seen.add(item.id);
        items.push(item);
      }
    }
    items.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));

    freshArea.innerHTML = '';

    const hdr = document.createElement('div');
    hdr.className = 'goods-intro';
    hdr.innerHTML = `
      <div class="goods-intro-eyebrow">실시간 공방 매물</div>
      <div class="goods-intro-title">공방에 참여한 아이돌의<br>실시간 매물을 확인해보세요</div>
      <div class="goods-intro-footer">
        <div class="goods-intro-sub">${items.length > 0 ? `${items.length}개 매물 · 최신순` : '등록된 매물 없음'}</div>
      </div>
    `;
    freshArea.appendChild(hdr);

    if(items.length === 0){
      const empty = document.createElement('div');
      empty.className = 'goods-empty';
      empty.textContent = '이날 출연 그룹 관련 공방 굿즈 매물이 없습니다.';
      freshArea.appendChild(empty);
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'goods-grid';
    items.slice(0, 60).forEach((item, i) => {
      const productUrl = `https://globalbunjang.com/product/${item.id}`;
      const imgSrc = item.imageUrl ? `/api/image?url=${encodeURIComponent(item.imageUrl)}` : '';
      const imgHtml = imgSrc ? `<img src="${imgSrc}" alt="${escHtml(item.name)}" loading="lazy" onerror="this.classList.add('err')">` : '';
      const card = document.createElement('div');
      card.className = 'gcard';
      card.style.cssText = `animation:fadeUp .22s ease both;animation-delay:${i*15}ms`;
      card.innerHTML = `
        <div class="gcard-img">
          <div class="gcard-img-fallback">🎤</div>
          ${imgHtml}
        </div>
        <div class="gcard-body">
          <div class="gcard-name">${escHtml(item.name)}</div>
          <div class="gcard-price">₩${item.price.toLocaleString()}</div>
        </div>
      `;
      card.onclick = () => window.open(productUrl, '_blank');
      grid.appendChild(card);
    });
    freshArea.appendChild(grid);

  } catch(err) {
    const a = document.getElementById('live-goods-area');
    if(a) a.innerHTML = `<div style="padding:16px 14px;color:var(--txt2);font-size:12px">매물 로드 실패: ${escHtml(err.message)}</div>`;
  }
}

// ─────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),350)},2200);
}

// ─────────────────────────────────────────
//  공방 일정 로드 (Supabase music_show_lineups)
// ─────────────────────────────────────────
async function fetchMusicShowLineups() {
  try {
    const since = new Date(TODAY);
    since.setMonth(since.getMonth() - 6);
    const sinceStr = dKey(since);
    const res = await supaFetch(
      `music_show_lineups?select=*&broad_date=gte.${sinceStr}&order=broad_date.asc`
    );
    if (!res.ok) { console.warn('[KF_Calendar] fetchLineups HTTP', res.status); return; }
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length === 0) return;

    LINEUP_BY_DATE = {};
    rows.forEach(r => {
      const dateKey = (r.broad_date || '').slice(0, 10);
      if (!dateKey) return;
      LINEUP_BY_DATE[dateKey] = {
        showName: r.show_name,
        episode:  r.episode_number,
        groups:   r.groups || [],
        rawTitle: r.raw_title || '',
      };
    });

    EVENTS = rows.map(r => {
      const show = SHOW_LABELS[r.show_name] || { name: r.show_name, color: '#9B6FD8' };
      return {
        id:    `lineup-${r.id}`,
        group: r.show_name,
        date:  (r.broad_date || '').slice(0, 10),
        name:  show.name,
        type:  'gonbang',
        venue: r.episode_number ? `${r.episode_number}회` : '',
        color: show.color,
      };
    });

    // Default to most recent past show with lineup
    const todayKey = dKey(TODAY);
    const pastDates = Object.keys(LINEUP_BY_DATE)
      .filter(ds => ds <= todayKey)
      .sort();
    if(pastDates.length > 0) {
      const ds = pastDates[pastDates.length - 1];
      const [y,mo] = ds.split('-').map(Number);
      weekStart = getWeekStart(new Date(y, mo-1, parseInt(ds.split('-')[2])));
      monthPivot = new Date(y, mo-1, 1);
      selectDate(ds);
    } else {
      buildCal();
      renderBottom();
    }
  } catch(e) {
    console.warn('[KF_Calendar] fetchLineups 실패:', e.message);
  }
}

function openSubmitModal() {
  const existing = document.getElementById('submit-modal');
  if (existing) { existing.remove(); return; }

  const overlay = document.createElement('div');
  overlay.id = 'submit-modal';
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;
    display:flex;align-items:center;justify-content:center;padding:16px;
  `;
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div style="background:#FFFFFF;border-radius:var(--r);padding:24px;width:100%;max-width:420px;
                box-shadow:0 8px 40px rgba(0,0,0,0.2);color:var(--txt1);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div style="font-size:16px;font-weight:700;letter-spacing:0">Submit an Event</div>
        <div onclick="document.getElementById('submit-modal').remove()"
             style="cursor:pointer;font-size:20px;color:var(--txt2);">×</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <input id="sf-name" placeholder="Event name" style="${inputStyle()}">
        <input id="sf-date" type="date" style="${inputStyle()}">
        <input id="sf-nick" placeholder="Your nickname (optional)" style="${inputStyle()}">
        <input id="sf-url" placeholder="Source URL (official notice, article…)" style="${inputStyle()}">
        <button onclick="submitEvent()" style="
          background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);
          padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;letter-spacing:0;
        ">Submit for Review</button>
        <div id="sf-msg" style="font-size:12px;text-align:center;color:var(--txt2);min-height:16px;"></div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function inputStyle() {
  return `width:100%;padding:10px 12px;border-radius:var(--r-sm);border:1px solid var(--border2);
          background:var(--bg3);color:var(--txt1);font-size:14px;outline:none;box-sizing:border-box;`;
}

async function submitEvent() {
  const name  = document.getElementById('sf-name').value.trim();
  const date  = document.getElementById('sf-date').value;
  const nick  = document.getElementById('sf-nick').value.trim();
  const url   = document.getElementById('sf-url').value.trim();
  const msg   = document.getElementById('sf-msg');

  if (!name || !date) {
    msg.style.color = '#e05'; msg.textContent = 'Please fill in Name and Date.'; return;
  }

  msg.style.color = 'var(--txt2)'; msg.textContent = 'Submitting…';

  try {
    const res = await supaFetch('event_submissions', {
      method: 'POST',
      body: JSON.stringify({
        name, date_start: date,
        submitted_by: nick,
        evidence_url: url,
      }),
    });
    if (res.ok || res.status === 201) {
      msg.style.color = '#0a0'; msg.textContent = '✓ Submitted! We will review it shortly.';
      setTimeout(() => document.getElementById('submit-modal')?.remove(), 2000);
    } else {
      const err = await res.json();
      msg.style.color = '#e05'; msg.textContent = 'Error: ' + (err.message || res.status);
    }
  } catch(e) {
    msg.style.color = '#e05'; msg.textContent = 'Network error. Please try again.';
  }
}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:15px;font-weight:700;letter-spacing:0">Share your feedback</div>

      </div>
      <textarea id="fb-text" placeholder="Any thoughts? Feature requests, bugs, anything…"

               font-family:inherit;box-sizing:border-box"></textarea>
      <button onclick="submitFeedback()" style="margin-top:12px;width:100%;background:var(--accent);color:#fff;
              border:none;border-radius:var(--r-sm);padding:12px;font-size:14px;font-weight:700;cursor:pointer">
        Submit Feedback
      </button>
      <div id="fb-msg" style="margin-top:8px;font-size:12px;text-align:center;color:var(--txt2);min-height:16px"></div>
    </div>
  `;
  document.body.appendChild(overlay);
}

let _fbRating = 0;
function setRating(n) {
  _fbRating = n;
  document.querySelectorAll('#fb-stars span').forEach(s => {
    s.style.opacity = Number(s.dataset.s) <= n ? '1' : '0.3';
  });
}

async function submitFeedback() {
  const msg  = document.getElementById('fb-msg');
  const text = document.getElementById('fb-text').value.trim();
  if(!_fbRating) { msg.style.color='#e05'; msg.textContent='Please select a rating.'; return; }
  msg.style.color='var(--txt2)'; msg.textContent='Submitting…';
  try {
    const res = await supaFetch('feedbacks', {
      method:'POST',
      prefer:'return=minimal',
      body: JSON.stringify({ rating: _fbRating, message: text }),
    });
    if(res.ok || res.status===201) {
      msg.style.color='#0a0'; msg.textContent='✓ Thank you for your feedback!';
      setTimeout(()=>document.getElementById('fb-modal')?.remove(), 1800);
    } else {
      msg.style.color='#e05'; msg.textContent='Error. Please try again.';
    }
  } catch(e) {
    msg.style.color='#e05'; msg.textContent='Network error.';
  }
}
